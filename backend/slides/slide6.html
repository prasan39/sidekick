<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #181B24; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center;
}
.content { padding: 60pt; text-align: center; }
h1 { 
  color: #B165FB; font-size: 42pt; font-weight: bold;
  margin: 0 0 30pt 0; line-height: 1.3;
}
.stats {
  display: flex; justify-content: center; gap: 50pt;
  margin-top: 40pt;
}
.stat {
  text-align: center;
}
.number {
  color: #40695B; font-size: 48pt; font-weight: bold;
  margin: 0;
}
.label {
  color: #FFFFFF; font-size: 16pt; margin: 10pt 0 0 0;
  opacity: 0.9;
}
</style>
</head>
<body>
<div class="content">
  <h1>AI in 2025: Transforming Every Industry</h1>
  <div class="stats">
    <div class="stat">
      <p class="number">80%</p>
      <p class="label">of companies<br/>using AI</p>
    </div>
    <div class="stat">
      <p class="number">$200B</p>
      <p class="label">global AI<br/>market</p>
    </div>
    <div class="stat">
      <p class="number">500M</p>
      <p class="label">daily AI<br/>interactions</p>
    </div>
  </div>
</div>
</body>
</html>

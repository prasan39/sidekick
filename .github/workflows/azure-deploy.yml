name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Prepare deploy artifact
        run: |
          # Create isolated deploy directory (outside workspace root)
          DEPLOY_DIR=$(mktemp -d)
          mkdir -p "$DEPLOY_DIR/backend" "$DEPLOY_DIR/frontend"

          # Backend: compiled JS + package.json
          cp -r backend/dist "$DEPLOY_DIR/backend/dist"
          cp backend/package.json "$DEPLOY_DIR/backend/"

          # Frontend: built static files
          cp -r frontend/dist "$DEPLOY_DIR/frontend/dist"

          # Install backend production deps in isolated dir (no workspace interference)
          cd "$DEPLOY_DIR/backend"
          npm install --omit=dev
          # Verify Copilot platform binary is present (it's an optionalDep)
          if [ ! -d "node_modules/@github/copilot-linux-x64" ]; then
            echo "⚠ copilot-linux-x64 missing, installing explicitly..."
            npm install @github/copilot-linux-x64@$(node -e "console.log(require('./node_modules/@github/copilot/package.json').optionalDependencies['@github/copilot-linux-x64'])")
          fi
          echo "=== @github packages ==="
          ls node_modules/@github/
          cd "$DEPLOY_DIR"

          # Root package.json with start script
          node -e 'require("fs").writeFileSync("package.json",JSON.stringify({name:"coworkpilot",version:"1.0.0",scripts:{start:"node backend/dist/index.js"}},null,2))'

          # Zip from deploy root
          zip -qr "$GITHUB_WORKSPACE/app.zip" .
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> "$GITHUB_ENV"

      - name: Validate artifact
        run: |
          echo "=== Zip size ==="
          ls -lh app.zip
          echo "=== Checking critical files exist in zip ==="
          unzip -l app.zip | grep -q "backend/dist/index.js" && echo "✓ backend/dist/index.js"
          unzip -l app.zip | grep -q "backend/node_modules/dotenv" && echo "✓ dotenv installed"
          unzip -l app.zip | grep -q "backend/node_modules/express" && echo "✓ express installed"
          unzip -l app.zip | grep -q "frontend/dist/index.html" && echo "✓ frontend/dist/index.html"
          unzip -l app.zip | grep -q "copilot-linux-x64" && echo "✓ copilot-linux-x64 binary" || { echo "✗ copilot-linux-x64 MISSING"; exit 1; }
          echo "=== Smoke test: import resolution check ==="
          cd "$DEPLOY_DIR"
          PORT=0 NODE_ENV=production SERVE_FRONTEND=false DISABLE_EMBEDDINGS=1 \
            timeout 10 node --input-type=module -e "
              import('./backend/dist/index.js')
                .then(() => { console.log('✓ Smoke: imports resolved'); setTimeout(() => process.exit(0), 2000); })
                .catch(e => { console.error('✗ Smoke failed:', e.message); process.exit(1); });
          " || { echo "Smoke test failed — aborting deploy"; exit 1; }

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy
        run: |
          az webapp deploy --resource-group cowork --name coworkpilot \
            --type zip --src-path app.zip --async true

      - name: Verify deployment
        run: |
          echo "Waiting 90s for deploy + app startup..."
          sleep 90
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              https://coworkpilot.azurewebsites.net/api/health || echo "000")
            echo "Health check attempt $i: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ App is running"
              exit 0
            fi
            sleep 30
          done
          echo "⚠ App did not respond with 200 after 5 attempts"
          az webapp log deployment show --name coworkpilot --resource-group cowork 2>&1 | tail -20
          exit 1

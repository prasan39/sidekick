name: Deploy workforge to Azure App Service

on:
  workflow_dispatch:

concurrency:
  group: deploy-workforge
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy-workforge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Prepare deploy artifact
        run: |
          set -euo pipefail

          # Create isolated deploy directory (outside workspace root)
          DEPLOY_DIR=$(mktemp -d)
          mkdir -p "$DEPLOY_DIR/backend" "$DEPLOY_DIR/frontend"

          # Backend: compiled JS + package.json
          cp -r backend/dist "$DEPLOY_DIR/backend/dist"
          cp backend/package.json "$DEPLOY_DIR/backend/"

          # Frontend: built static files
          cp -r frontend/dist "$DEPLOY_DIR/frontend/dist"

          # Install backend production deps in isolated dir (prevents workspace hoisting issues)
          cd "$DEPLOY_DIR/backend"
          npm install --omit=dev --ignore-scripts
          # Rebuild native modules for Linux target
          npm rebuild better-sqlite3 || true
          cd "$DEPLOY_DIR"

          # Root package.json with start script
          node -e 'require("fs").writeFileSync("package.json",JSON.stringify({name:"workforge",version:"1.0.0",scripts:{start:"node backend/dist/index.js"}},null,2))'

          # Zip from deploy root
          zip -qr "$GITHUB_WORKSPACE/app.zip" .
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> "$GITHUB_ENV"

      - name: Validate artifact
        run: |
          set -euo pipefail

          echo "=== Zip size ==="
          ls -lh app.zip

          echo "=== Checking critical files in artifact ==="
          unzip -l app.zip | grep -q "backend/dist/index.js" && echo "✓ backend/dist/index.js"
          unzip -l app.zip | grep -q "backend/node_modules/dotenv" && echo "✓ dotenv installed"
          unzip -l app.zip | grep -q "backend/node_modules/express" && echo "✓ express installed"
          unzip -l app.zip | grep -q "frontend/dist/index.html" && echo "✓ frontend/dist/index.html"

          echo "=== Smoke test: import resolution check ==="
          cd "$DEPLOY_DIR"
          PORT=0 NODE_ENV=production SERVE_FRONTEND=false DISABLE_EMBEDDINGS=1 \
            timeout 10 node --input-type=module -e "
              import('./backend/dist/index.js')
                .then(() => { console.log('✓ Smoke: imports resolved'); setTimeout(() => process.exit(0), 2000); })
                .catch(e => { console.error('✗ Smoke failed:', e.message); process.exit(1); });
          " || { echo "Smoke test failed — aborting deploy"; exit 1; }

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy
        run: |
          set -euo pipefail

          # Async avoids gateway timeout during large zip upload/deploy processing.
          az webapp deploy \
            --resource-group cowork \
            --name workforge \
            --type zip \
            --src-path app.zip \
            --enable-kudu-warmup false \
            --async true

      - name: Verify deployment
        run: |
          set -euo pipefail

          echo "Waiting 120s for deploy + app startup..."
          sleep 120

          for i in 1 2 3 4 5 6 7; do
            health_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://workforge.azurewebsites.net/api/health || echo "000")
            root_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://workforge.azurewebsites.net/ || echo "000")
            echo "Attempt $i: /api/health=$health_code, /=$root_code"
            if [ "$health_code" = "200" ] && [ "$root_code" = "200" ]; then
              echo "✓ workforge is live"
              exit 0
            fi
            sleep 30
          done

          echo "✗ workforge did not become healthy in time"
          az webapp log deployment show --name workforge --resource-group cowork 2>&1 | tail -80 || true
          exit 1

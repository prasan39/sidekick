##############################################################################
# render.yaml — CoWork Terminal (single-service deploy)
#
# Both frontend and backend run as ONE Render Web Service.
# The backend builds the Vite frontend, then serves its dist/ as static files
# via express.static when SERVE_FRONTEND=true.
#
# WebSocket (/ws) and all /api/* routes are handled by the Express backend.
# The frontend JS connects to the same origin — no CORS or proxy needed.
#
# To deploy:
#   1. Push this repo to GitHub.
#   2. In Render → New → Blueprint → select this repo.
#   3. Fill in the one required secret (COPILOT_GITHUB_TOKEN) when prompted.
##############################################################################

services:
  - type: web
    name: aiteamco
    runtime: node

    # Root of the monorepo inside the git repo
    rootDir: .

    # Install deps for root workspace, frontend, and backend; then build both
    buildCommand: >
      npm install &&
      cd frontend && npm install && npm run build && cd .. &&
      cd backend && npm install && npm run build && cd ..

    # Start the compiled backend (which also serves the built frontend)
    startCommand: node backend/dist/index.js

    # Render free tier: 512 MB RAM. Upgrade if embedding model (xenova) OOMs.
    plan: free

    # Health check — Render will restart the service if this fails
    healthCheckPath: /api/health

    envVars:
      # ── Runtime ──────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production

      # Tell the backend to serve the built frontend from frontend/dist/
      - key: SERVE_FRONTEND
        value: "true"

      # Render injects PORT automatically; this default is only a fallback
      - key: PORT
        value: "3001"

      # ── GitHub Copilot Auth (REQUIRED) ───────────────────────────────────
      # Get your token locally:  gh auth token
      # Paste it here once — Render will store it as an encrypted secret.
      - key: COPILOT_GITHUB_TOKEN
        sync: false        # "sync: false" = Render prompts you to enter it manually

      # ── Feature flags (all optional) ─────────────────────────────────────
      # Microsoft 365 Work IQ integration (Teams, Exchange, SharePoint)
      - key: WORKIQ_ENABLED
        value: "false"

      # Substack digest pipeline
      - key: SUBSTACK_DIGEST_ENABLED
        value: "false"

      # Clear conversation history on every server restart (set to "false" in prod)
      - key: CLEAR_HISTORY_ON_START
        value: "false"

      # ── Optional integrations (leave blank to disable) ───────────────────
      # Gmail OAuth
      # - key: GMAIL_CLIENT_ID
      #   sync: false
      # - key: GMAIL_CLIENT_SECRET
      #   sync: false

      # Notion (for Substack digest publishing)
      # - key: NOTION_API_KEY
      #   sync: false
      # - key: NOTION_PAGE_ID
      #   value: ""

    # Persistent disk for SQLite DB + memory data + uploads
    # Free tier does NOT support disks — upgrade to Starter ($7/mo) to enable.
    # Without a disk, data resets on every deploy.
    # Uncomment when on a paid plan:
    #
    # disk:
    #   name: cowork-data
    #   mountPath: /opt/render/project/src/backend/data
    #   sizeGB: 1
